<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NUCLEAR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+KR:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --border2: #3a3a3a;
    --text: #e8e8e8;
    --text2: #888;
    --text3: #555;
    --accent: #c8ff00;
    --accent-dim: #8aad00;
    --danger: #ff4444;
    --info: #4488ff;
    --success: #00cc77;
    --warning: #ffaa00;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans KR', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* LOCK SCREEN */
  #lock-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  .lock-wordmark {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 48px;
    font-weight: 600;
    letter-spacing: 12px;
    color: var(--accent);
    margin-bottom: 40px;
  }

  .lock-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .lock-row {
    display: flex;
    gap: 0;
    border: 1px solid var(--border2);
  }

  #pw-input {
    background: var(--surface);
    border: none;
    color: var(--accent);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 22px;
    letter-spacing: 10px;
    padding: 14px 24px;
    width: 160px;
    text-align: center;
    outline: none;
  }

  #pw-input:focus { background: var(--surface2); }

  .lock-btn {
    background: var(--accent);
    border: none;
    color: #000;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    padding: 14px 20px;
    cursor: pointer;
    text-transform: uppercase;
    transition: opacity 0.15s;
  }

  .lock-btn:hover { opacity: 0.85; }

  .lock-error {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--danger);
    letter-spacing: 2px;
    margin-top: 16px;
    display: none;
  }

  /* MAIN APP */
  #main-app { display: none; max-width: 720px; margin: 0 auto; padding: 32px 20px 60px; }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
  }

  .wordmark {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 6px;
    color: var(--accent);
  }

  .lock-icon-btn {
    background: none;
    border: 1px solid var(--border2);
    color: var(--text2);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 6px 12px;
    cursor: pointer;
    text-transform: uppercase;
    transition: border-color 0.15s, color 0.15s;
  }

  .lock-icon-btn:hover { border-color: var(--text2); color: var(--text); }

  /* TABS */
  .tab-bar {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }

  .tab {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text3);
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    margin-bottom: -1px;
    padding: 10px 18px;
    text-transform: uppercase;
    transition: color 0.15s;
  }

  .tab:hover { color: var(--text2); }
  .tab.active { border-bottom-color: var(--accent); color: var(--accent); }

  .section { display: none; }
  .section.active { display: block; }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px 24px;
    margin-bottom: 16px;
  }

  .card-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  /* FIELDS */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }

  .field label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text3);
    text-transform: uppercase;
  }

  .field select,
  .field input[type="text"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'IBM Plex Sans KR', sans-serif;
    font-size: 14px;
    padding: 10px 12px;
    outline: none;
    width: 100%;
    transition: border-color 0.15s;
    appearance: none;
    -webkit-appearance: none;
  }

  .field select:focus,
  .field input[type="text"]:focus { border-color: var(--border2); }

  /* SLIDERS */
  .slider-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
  }

  .slider-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--text2);
    width: 80px;
    flex-shrink: 0;
  }

  input[type="range"] {
    flex: 1;
    appearance: none;
    -webkit-appearance: none;
    height: 2px;
    background: var(--border2);
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    appearance: none;
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    background: var(--accent);
    cursor: pointer;
  }

  input[type="range"]:disabled { opacity: 0.3; cursor: default; }
  input[type="range"]:disabled::-webkit-slider-thumb { cursor: default; }

  .slider-val {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    width: 40px;
    text-align: right;
    flex-shrink: 0;
  }

  /* RESULT BOX */
  .result-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    padding: 20px 24px;
    margin-top: 20px;
  }

  .result-matchup {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .result-prob {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 52px;
    font-weight: 600;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 8px;
  }

  .result-desc {
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 14px;
  }

  .pills { display: flex; gap: 8px; flex-wrap: wrap; }

  .pill {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 4px 10px;
    border: 1px solid;
  }

  .pill-data { border-color: var(--info); color: var(--info); }
  .pill-gut { border-color: var(--success); color: var(--success); }

  /* BUTTONS */
  .btn-primary {
    background: var(--accent);
    border: none;
    color: #000;
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 3px;
    padding: 14px 24px;
    text-transform: uppercase;
    width: 100%;
    margin-top: 16px;
    transition: opacity 0.15s;
  }

  .btn-primary:hover { opacity: 0.85; }

  .btn-secondary {
    background: none;
    border: 1px solid var(--border2);
    color: var(--text2);
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 10px 16px;
    text-transform: uppercase;
    transition: border-color 0.15s, color 0.15s;
    flex: 1;
  }

  .btn-secondary:hover { border-color: var(--text2); color: var(--text); }

  .btn-danger {
    background: none;
    border: 1px solid var(--danger);
    color: var(--danger);
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 10px 16px;
    text-transform: uppercase;
    transition: background 0.15s;
  }

  .btn-danger:hover { background: rgba(255,68,68,0.08); }

  .btn-row { display: flex; gap: 10px; margin-top: 12px; }

  /* HISTORY TABLE */
  .table-wrap { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  th {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text3);
    text-align: left;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
    white-space: nowrap;
  }

  td {
    padding: 12px 10px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
    color: var(--text2);
  }

  tr:hover td { background: var(--surface2); }

  .mono { font-family: 'IBM Plex Mono', monospace; }

  .badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 3px 8px;
    border: 1px solid;
  }

  .badge-league { border-color: var(--border2); color: var(--text2); }
  .badge-home { border-color: var(--success); color: var(--success); }
  .badge-away { border-color: var(--danger); color: var(--danger); }
  .badge-hit { border-color: var(--info); color: var(--info); }
  .badge-miss { border-color: var(--warning); color: var(--warning); }

  .result-btns { display: flex; gap: 6px; }

  .mini-btn {
    background: none;
    border: 1px solid var(--border2);
    color: var(--text2);
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 4px 8px;
    text-transform: uppercase;
    transition: border-color 0.15s, color 0.15s;
  }

  .mini-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* STATS */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 14px;
  }

  .stat-cell {
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 16px;
    text-align: center;
  }

  .stat-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 28px;
    font-weight: 600;
    color: var(--accent);
    display: block;
  }

  .stat-lbl {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text3);
    text-transform: uppercase;
    margin-top: 4px;
    display: block;
  }

  .empty {
    text-align: center;
    padding: 40px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text3);
    text-transform: uppercase;
  }
</style>
</head>
<body>

<!-- LOCK SCREEN -->
<div id="lock-screen">
  <div class="lock-wordmark">NUCLEAR</div>
  <div class="lock-label">비밀번호 입력</div>
  <div class="lock-row">
    <input type="password" id="pw-input" maxlength="10" placeholder="····"
      onkeydown="if(event.key==='Enter')checkPw()" autocomplete="off" />
    <button class="lock-btn" onclick="checkPw()">ENTER</button>
  </div>
  <div class="lock-error" id="pw-error">ACCESS DENIED</div>
</div>

<!-- MAIN APP -->
<div id="main-app">
  <div class="topbar">
    <div class="wordmark">NUCLEAR</div>
    <button class="lock-icon-btn" onclick="lockApp()">LOCK</button>
  </div>

  <div class="tab-bar">
    <button class="tab active" onclick="showTab('predict', this)">예측</button>
    <button class="tab" onclick="showTab('history', this)">기록</button>
    <button class="tab" onclick="showTab('stats', this)">통계</button>
    <button class="tab" onclick="showTab('data', this)">데이터</button>
  </div>

  <!-- 예측 -->
  <div id="tab-predict" class="section active">
    <div class="card">
      <div class="card-title">경기 정보</div>
      <div class="two-col">
        <div class="field">
          <label>리그</label>
          <select id="league">
            <option>KBO</option>
            <option>MLB</option>
            <option>NPB</option>
          </select>
        </div>
        <div class="field">
          <label>날짜</label>
          <input type="text" id="game-date" placeholder="2025-03-30" />
        </div>
      </div>
      <div class="two-col">
        <div class="field">
          <label>홈팀</label>
          <input type="text" id="home-team" placeholder="홈팀" oninput="calcProb()" />
        </div>
        <div class="field">
          <label>원정팀</label>
          <input type="text" id="away-team" placeholder="원정팀" oninput="calcProb()" />
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">가중치</div>
      <div class="slider-row">
        <span class="slider-label">데이터</span>
        <input type="range" min="0" max="100" value="70" id="data-weight" step="5" oninput="updateWeights()" />
        <span class="slider-val" id="data-w-val">70%</span>
      </div>
      <div class="slider-row">
        <span class="slider-label">나의 감</span>
        <input type="range" min="0" max="100" value="30" id="gut-weight" step="5" disabled />
        <span class="slider-val" id="gut-w-val">30%</span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">점수 입력 — 홈팀 기준 1~10</div>
      <div class="slider-row">
        <span class="slider-label">데이터 점수</span>
        <input type="range" min="1" max="10" value="5" id="data-score" step="1" oninput="calcProb()" />
        <span class="slider-val" id="data-score-val">5</span>
      </div>
      <div class="slider-row">
        <span class="slider-label">나의 감</span>
        <input type="range" min="1" max="10" value="5" id="gut-score" step="1" oninput="calcProb()" />
        <span class="slider-val" id="gut-score-val">5</span>
      </div>

      <div class="result-box">
        <div class="result-matchup" id="result-matchup">홈팀 vs 원정팀</div>
        <div class="result-prob" id="result-prob">50%</div>
        <div class="result-desc" id="result-desc">홈팀 승리 확률</div>
        <div class="pills">
          <span class="pill pill-data" id="pill-data">데이터 70%</span>
          <span class="pill pill-gut" id="pill-gut">감 30%</span>
        </div>
      </div>

      <button class="btn-primary" onclick="saveGame()">저장</button>
    </div>
  </div>

  <!-- 기록 -->
  <div id="tab-history" class="section">
    <div class="card">
      <div class="card-title">경기 기록</div>
      <div class="table-wrap">
        <div id="history-list"><div class="empty">기록 없음</div></div>
      </div>
    </div>
  </div>

  <!-- 통계 -->
  <div id="tab-stats" class="section">
    <div class="stat-grid">
      <div class="stat-cell"><span class="stat-num" id="stat-total">0</span><span class="stat-lbl">총 경기</span></div>
      <div class="stat-cell"><span class="stat-num" id="stat-hit">0</span><span class="stat-lbl">적중</span></div>
      <div class="stat-cell"><span class="stat-num" id="stat-rate">-%</span><span class="stat-lbl">적중률</span></div>
    </div>
    <div class="stat-grid">
      <div class="stat-cell"><span class="stat-num" id="stat-kbo">0</span><span class="stat-lbl">KBO</span></div>
      <div class="stat-cell"><span class="stat-num" id="stat-mlb">0</span><span class="stat-lbl">MLB</span></div>
      <div class="stat-cell"><span class="stat-num" id="stat-npb">0</span><span class="stat-lbl">NPB</span></div>
    </div>
  </div>

  <!-- 데이터 -->
  <div id="tab-data" class="section">
    <div class="card">
      <div class="card-title">데이터 저장 / 불러오기</div>
      <div style="font-size:13px; color:var(--text2); margin-bottom:16px; line-height:1.7;">
        브라우저를 닫기 전 반드시 저장하세요.<br>다음 접속 시 불러오기로 복원할 수 있습니다.
      </div>
      <div class="btn-row">
        <button class="btn-secondary" onclick="exportData()">저장 (다운로드)</button>
        <button class="btn-secondary" onclick="document.getElementById('file-input').click()">불러오기</button>
      </div>
      <input type="file" id="file-input" accept=".json" style="display:none" onchange="importData(event)" />
    </div>
    <div class="card">
      <div class="card-title" style="color:var(--danger);">초기화</div>
      <div style="font-size:13px; color:var(--text2); margin-bottom:16px;">모든 기록이 삭제됩니다. 먼저 저장하세요.</div>
      <button class="btn-danger" onclick="clearData()">전체 삭제</button>
    </div>
  </div>
</div>

<script>
const PW = '2013';
let games = [];

function checkPw() {
  const v = document.getElementById('pw-input').value;
  if (v === PW) {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    loadFromStorage();
  } else {
    document.getElementById('pw-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
  }
}

function lockApp() {
  document.getElementById('lock-screen').style.display = 'flex';
  document.getElementById('main-app').style.display = 'none';
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-error').style.display = 'none';
}

function showTab(name, el) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  el.classList.add('active');
  if (name === 'history') renderHistory();
  if (name === 'stats') renderStats();
}

function updateWeights() {
  const dw = parseInt(document.getElementById('data-weight').value);
  const gw = 100 - dw;
  document.getElementById('gut-weight').value = gw;
  document.getElementById('data-w-val').textContent = dw + '%';
  document.getElementById('gut-w-val').textContent = gw + '%';
  calcProb();
}

function calcProb() {
  const dw = parseInt(document.getElementById('data-weight').value) / 100;
  const gw = 1 - dw;
  const ds = parseInt(document.getElementById('data-score').value);
  const gs = parseInt(document.getElementById('gut-score').value);
  document.getElementById('data-score-val').textContent = ds;
  document.getElementById('gut-score-val').textContent = gs;
  const prob = Math.round(((ds * dw + gs * gw) / 10) * 100);
  const home = document.getElementById('home-team').value || '홈팀';
  const away = document.getElementById('away-team').value || '원정팀';
  document.getElementById('result-matchup').textContent = home + ' vs ' + away;
  document.getElementById('result-prob').textContent = prob + '%';
  document.getElementById('result-desc').textContent =
    prob >= 50 ? home + ' 승리 확률' : away + ' 승리 확률 ' + (100 - prob) + '%';
  document.getElementById('pill-data').textContent = '데이터 ' + Math.round(dw * 100) + '%';
  document.getElementById('pill-gut').textContent = '감 ' + Math.round(gw * 100) + '%';
}

function saveGame() {
  const home = document.getElementById('home-team').value.trim();
  const away = document.getElementById('away-team').value.trim();
  const date = document.getElementById('game-date').value.trim();
  if (!home || !away || !date) { alert('날짜, 홈팀, 원정팀을 입력하세요'); return; }
  const dw = parseInt(document.getElementById('data-weight').value) / 100;
  const gw = 1 - dw;
  const ds = parseInt(document.getElementById('data-score').value);
  const gs = parseInt(document.getElementById('gut-score').value);
  const prob = Math.round(((ds * dw + gs * gw) / 10) * 100);
  games.push({
    id: Date.now(), date,
    league: document.getElementById('league').value,
    home, away, prob,
    dataScore: ds, gutScore: gs,
    dataWeight: Math.round(dw * 100),
    gutWeight: Math.round(gw * 100),
    result: null, hit: null
  });
  saveToStorage();
  alert('저장되었습니다');
}

function renderHistory() {
  const el = document.getElementById('history-list');
  if (!games.length) { el.innerHTML = '<div class="empty">기록 없음</div>'; return; }
  const sorted = [...games].sort((a, b) => b.id - a.id);
  el.innerHTML = `<table>
    <thead><tr>
      <th>날짜</th><th>리그</th><th>경기</th><th>확률</th><th>결과</th><th>적중</th>
    </tr></thead>
    <tbody>${sorted.map(g => `<tr>
      <td class="mono" style="font-size:12px;white-space:nowrap;">${g.date}</td>
      <td><span class="badge badge-league">${g.league}</span></td>
      <td style="font-size:12px;">${g.home} vs ${g.away}</td>
      <td class="mono" style="color:var(--accent);font-weight:500;">${g.prob}%</td>
      <td>${g.result === null
        ? `<div class="result-btns">
            <button class="mini-btn" onclick="setResult(${g.id},'home')">홈승</button>
            <button class="mini-btn" onclick="setResult(${g.id},'away')">원정승</button>
           </div>`
        : `<span class="badge ${g.result === 'home' ? 'badge-home' : 'badge-away'}">${g.result === 'home' ? g.home : g.away}</span>`
      }</td>
      <td>${g.hit === null ? '<span style="color:var(--text3);">-</span>'
        : g.hit
          ? '<span class="badge badge-hit">적중</span>'
          : '<span class="badge badge-miss">실패</span>'
      }</td>
    </tr>`).join('')}</tbody>
  </table>`;
}

function setResult(id, result) {
  const g = games.find(x => x.id === id);
  if (!g) return;
  g.result = result;
  g.hit = (g.prob >= 50 && result === 'home') || (g.prob < 50 && result === 'away');
  saveToStorage();
  renderHistory();
  renderStats();
}

function renderStats() {
  const finished = games.filter(g => g.result !== null);
  const hits = finished.filter(g => g.hit);
  document.getElementById('stat-total').textContent = games.length;
  document.getElementById('stat-hit').textContent = hits.length;
  document.getElementById('stat-rate').textContent = finished.length
    ? Math.round((hits.length / finished.length) * 100) + '%' : '-%';
  document.getElementById('stat-kbo').textContent = games.filter(g => g.league === 'KBO').length;
  document.getElementById('stat-mlb').textContent = games.filter(g => g.league === 'MLB').length;
  document.getElementById('stat-npb').textContent = games.filter(g => g.league === 'NPB').length;
}

function saveToStorage() {
  try { localStorage.setItem('nuclear_games', JSON.stringify(games)); } catch(e) {}
}

function loadFromStorage() {
  try {
    const d = localStorage.getItem('nuclear_games');
    if (d) games = JSON.parse(d);
  } catch(e) {}
  calcProb();
}

function exportData() {
  const blob = new Blob([JSON.stringify(games, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'nuclear_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      games = JSON.parse(ev.target.result);
      saveToStorage();
      alert('불러오기 완료 (' + games.length + '개 경기)');
    } catch { alert('파일을 읽을 수 없습니다'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function clearData() {
  if (confirm('모든 데이터를 삭제하시겠습니까?')) {
    games = [];
    localStorage.removeItem('nuclear_games');
    alert('초기화 완료');
  }
}
</script>
</body>
</html>
